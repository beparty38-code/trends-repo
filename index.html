<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb33;
    --green: #3fb950;
    --orange: #d29922;
    --purple: #bc8cff;
    --pink: #f778ba;
    --red: #f85149;
    --cyan: #39d2c0;
    --yellow: #e3b341;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .header {
    padding: 48px 32px 32px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .header p { color: var(--text-dim); font-size: 15px; }
  .header .date { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

  /* Filters */
  .filters {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Grid */
  .grid {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px 64px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card.selected { border-color: var(--yellow); }
  .card.selected:hover { border-color: var(--accent); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 8px;
  }
  .card-name-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-name { font-size: 17px; font-weight: 600; color: var(--accent); word-break: break-word; }
  .card-name span { color: var(--text-dim); font-weight: 400; }
  .card-stars { color: var(--orange); font-size: 14px; font-weight: 600; white-space: nowrap; }

  .selected-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: #e3b34122;
    color: var(--yellow);
    border: 1px solid var(--yellow);
    white-space: nowrap;
  }

  .card-desc { color: var(--text); font-size: 14px; margin-bottom: 16px; flex-grow: 1; }

  .card-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .card-lang { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-dim); }
  .lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .card-category { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; margin-left: auto; }

  .cat-agent { background: #1f6feb22; color: var(--accent); }
  .cat-infra { background: #bc8cff22; color: var(--purple); }
  .cat-security { background: #f8514922; color: var(--red); }
  .cat-frontend { background: #f778ba22; color: var(--pink); }
  .cat-data { background: #3fb95022; color: var(--green); }
  .cat-education { background: #d2992222; color: var(--orange); }
  .cat-devops { background: #39d2c022; color: var(--cyan); }
  .cat-etc { background: #8b949e22; color: var(--text-dim); }

  .card-detail-hint { font-size: 12px; color: var(--text-dim); margin-top: 12px; opacity: 0; transition: opacity 0.2s; }
  .card:hover .card-detail-hint { opacity: 1; }

  /* Detail Page */
  .detail-page { display: none; max-width: 900px; margin: 0 auto; padding: 0 32px 64px; }
  .detail-page.open { display: block; }

  .detail-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim); font-size: 14px; cursor: pointer;
    background: none; border: none; padding: 12px 0; margin-bottom: 16px;
    transition: color 0.2s;
  }
  .detail-back:hover { color: var(--accent); }

  .detail-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  .detail-header h1 { font-size: 26px; color: var(--accent); margin-bottom: 8px; }
  .detail-header-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; color: var(--text-dim); font-size: 14px; }
  .detail-header-meta .stars { color: var(--orange); font-weight: 600; }

  .detail-section { margin-bottom: 32px; }
  .detail-section h2 {
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .detail-section h3 { font-size: 14px; font-weight: 600; color: var(--purple); margin: 16px 0 8px; }
  .detail-section p { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .detail-section ul { padding-left: 20px; font-size: 14px; }
  .detail-section li { margin-bottom: 6px; color: var(--text); }
  .detail-section li strong { color: var(--accent); }
  .detail-section code {
    background: #1c2333; padding: 2px 6px; border-radius: 4px;
    font-size: 13px; color: var(--cyan);
  }
  .detail-section pre {
    background: #1c2333; border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; overflow-x: auto;
    font-size: 13px; line-height: 1.5; margin: 8px 0 12px;
    color: var(--text);
  }
  .detail-section pre code { background: none; padding: 0; color: var(--text); }

  .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .detail-tag {
    background: var(--border); color: var(--text-dim);
    padding: 4px 12px; border-radius: 16px; font-size: 13px;
  }

  .detail-link {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent-dim); color: var(--accent);
    padding: 10px 20px; border-radius: 8px;
    text-decoration: none; font-size: 14px; font-weight: 500;
    border: 1px solid transparent; transition: all 0.2s;
  }
  .detail-link:hover { border-color: var(--accent); background: #1f6feb44; }

  /* Architecture Table */
  .arch-table { width: 100%; border-collapse: collapse; margin: 8px 0 12px; font-size: 13px; }
  .arch-table th, .arch-table td {
    text-align: left; padding: 8px 12px; border: 1px solid var(--border);
  }
  .arch-table th { background: #1c2333; color: var(--text-dim); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
  .arch-table td { color: var(--text); }
  .arch-table tr:hover td { background: var(--surface-hover); }

  /* Workflow steps */
  .workflow-steps { list-style: none; padding-left: 0; counter-reset: step; }
  .workflow-steps li {
    counter-increment: step;
    padding: 12px 16px 12px 48px;
    position: relative;
    margin-bottom: 4px;
    border-radius: 8px;
    background: #1c2333;
    font-size: 14px;
  }
  .workflow-steps li::before {
    content: counter(step);
    position: absolute; left: 16px; top: 12px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent-dim); color: var(--accent);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  @media (max-width: 480px) {
    .header { padding: 32px 16px 24px; }
    .filters { padding: 0 16px 16px; }
    .grid { padding: 0 16px 48px; grid-template-columns: 1fr; }
    .detail-page { padding: 0 16px 48px; }
  }
</style>
</head>

// ============ RENDERING ============
function renderCards(filter = 'all') {
  const grid = document.getElementById('repoGrid');
  grid.innerHTML = '';

  let filtered;
  if (filter === 'selected') {
    filtered = repos.filter(r => r.selected);
  } else if (filter === 'all') {
    // Sort: selected first
    filtered = [...repos].sort((a, b) => (b.selected ? 1 : 0) - (a.selected ? 1 : 0));
  } else {
    filtered = repos.filter(r => r.category === filter);
  }

  filtered.forEach(repo => {
    const card = document.createElement('div');
    card.className = 'card' + (repo.selected ? ' selected' : '');
    card.dataset.id = repo.id;

    card.innerHTML = `
      <div class="card-top">
        <div class="card-name-wrap">
          <div class="card-name"><span>${repo.owner}/</span>${repo.name}</div>
          ${repo.selected ? '<span class="selected-badge">SELECTED</span>' : ''}
        </div>
        <div class="card-stars">${repo.stars}</div>
      </div>
      <div class="card-desc">${repo.desc}</div>
      <div class="card-meta">
        <div class="card-lang">
          <span class="lang-dot" style="background:${repo.langColor}"></span>
          ${repo.lang}
        </div>
        <span class="card-category cat-${repo.category}">${repo.categoryLabel}</span>
      </div>
      <div class="card-detail-hint">${repo.selected ? 'Click for deep dive' : 'Click to learn more'}</div>
    `;

    card.addEventListener('click', () => {
      if (repo.selected && details[repo.detail]) {
        showDetail(repo.detail);
      }
    });
    grid.appendChild(card);
  });
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter);
  });
});

// Detail page
function showDetail(id) {
  document.getElementById('repoGrid').style.display = 'none';
  document.getElementById('filters').style.display = 'none';
  document.getElementById('mainHeader').style.display = 'none';
  const page = document.getElementById('detailPage');
  page.innerHTML = details[id];
  page.classList.add('open');
  window.scrollTo(0, 0);
}

function showGrid() {
  document.getElementById('detailPage').classList.remove('open');
  document.getElementById('detailPage').innerHTML = '';
  document.getElementById('repoGrid').style.display = '';
  document.getElementById('filters').style.display = '';
  document.getElementById('mainHeader').style.display = '';
  window.scrollTo(0, 0);
}

// Init
renderCards();
</script>
