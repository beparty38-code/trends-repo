<div class="grid" id="repoGrid"></div>

<script>

  { id:'strix', owner:'usestrix', name:'strix', stars:'35k', lang:'Python', langColor:'#3572A5', category:'security', categoryLabel:'Security', url:'https://github.com/usestrix/strix', selected:false, desc:'AI 침투 테스트 도구. 실제 해킹처럼 코드를 동적 실행하며 OWASP Top 10 등 취약점을 자동 탐지하고 수정까지 지원.' },
  { id:'codex-plugin-cc', owner:'openai', name:'codex-plugin-cc', stars:'23.4k', lang:'JavaScript', langColor:'#f1e05a', category:'agent', categoryLabel:'AI Agent', url:'https://github.com/openai/codex-plugin-cc', selected:false, desc:'Claude Code 안에서 OpenAI Codex로 코드 리뷰, 적대적 리뷰, 백그라운드 작업을 위임하는 플러그인.' },
  { id:'caveman', owner:'JuliusBrussee', name:'caveman', stars:'83.1k', lang:'JS / TS', langColor:'#3178c6', category:'agent', categoryLabel:'AI Agent', url:'https://github.com/JuliusBrussee/caveman', selected:false, desc:'AI 에이전트가 간결한 "동굴인 말투"로 소통하게 하여 출력 토큰을 ~65% 절감. 코드 정확도는 유지.' },
  { id:'elasticsearch', owner:'elastic', name:'elasticsearch', stars:'77.4k', lang:'Java', langColor:'#b07219', category:'data', categoryLabel:'Data', url:'https://github.com/elastic/elasticsearch', selected:false, desc:'분산 RESTful 검색/분석 엔진. 벡터 검색, RAG, 전문 검색, 로그/메트릭 분석까지 지원.' },
  { id:'checkout', owner:'actions', name:'checkout', stars:'8.3k', lang:'TypeScript', langColor:'#3178c6', category:'devops', categoryLabel:'DevOps', url:'https://github.com/actions/checkout', selected:true, detail:'detail-checkout.html', desc:'GitHub Actions 공식 체크아웃 액션. 워크플로우에서 레포 코드를 가져오는 핵심 빌딩블록.' },
  { id:'chrome-devtools-mcp', owner:'ChromeDevTools', name:'chrome-devtools-mcp', stars:'45.6k', lang:'TypeScript', langColor:'#3178c6', category:'infra', categoryLabel:'AI Infra', url:'https://github.com/ChromeDevTools/chrome-devtools-mcp', selected:true, detail:'detail-chrome-devtools-mcp.html', desc:'AI 코딩 에이전트가 Chrome 브라우저를 직접 제어/검사하는 MCP 서버. 성능 분석, 네트워크, 자동화.' },
  { id:'astryx', owner:'facebook', name:'astryx', stars:'4.9k', lang:'TypeScript', langColor:'#3178c6', category:'frontend', categoryLabel:'Frontend', url:'https://github.com/facebook/astryx', selected:false, desc:'Meta의 디자인 시스템. 150+ 접근성 React 컴포넌트, 브랜드 테마, 다크모드. AI 에이전트 친화적.' },
  { id:'romm', owner:'rommapp', name:'romm', stars:'9.9k', lang:'Python / Vue', langColor:'#42b883', category:'etc', categoryLabel:'Etc', url:'https://github.com/rommapp/romm', selected:false, desc:'셀프호스팅 ROM 관리자/플레이어. IGDB 등 메타데이터 연동, 400+ 플랫폼 지원.' },
  { id:'cs249r_book', owner:'harvard-edge', name:'cs249r_book', stars:'26.3k', lang:'Python', langColor:'#3572A5', category:'education', categoryLabel:'Education', url:'https://github.com/harvard-edge/cs249r_book', selected:false, desc:'ML 시스템 오픈소스 교과서. 모델 훈련을 넘어 실제 시스템 구축/배포 전체 주기를 다룸.' },
  { id:'superpowers', owner:'obra', name:'superpowers', stars:'246k', lang:'Shell / JS', langColor:'#89e051', category:'agent', categoryLabel:'AI Agent', url:'https://github.com/obra/superpowers', selected:true, detail:'detail-superpowers.html', desc:'코딩 에이전트용 소프트웨어 개발 방법론 & 스킬 프레임워크. 설계부터 테스트까지 체계화.' },
  { id:'herdr', owner:'ogulcancelik', name:'herdr', stars:'10.9k', lang:'Rust', langColor:'#dea584', category:'agent', categoryLabel:'AI Agent', url:'https://github.com/ogulcancelik/herdr', selected:true, detail:'detail-herdr.html', desc:'여러 코딩 에이전트를 하나의 터미널에서 실행/관리하는 멀티플렉서. 상태를 한눈에 파악.' },
  { id:'CubeSandbox', owner:'TencentCloud', name:'CubeSandbox', stars:'7.2k', lang:'Rust / Go / C', langColor:'#dea584', category:'infra', categoryLabel:'AI Infra', url:'https://github.com/TencentCloud/CubeSandbox', selected:true, detail:'detail-cubesandbox.html', desc:'AI 에이전트용 경량 샌드박스. 60ms 부팅, 5MB 미만 메모리, KVM 기반 하드웨어 격리.' },
  { id:'agency-agents', owner:'msitarzewski', name:'agency-agents', stars:'127k', lang:'Shell', langColor:'#89e051', category:'agent', categoryLabel:'AI Agent', url:'https://github.com/msitarzewski/agency-agents', selected:true, detail:'detail-agency-agents.html', desc:'전문 AI 에이전트 페르소나 컬렉션. 엔지니어링, 마케팅, 영업 등 다양한 역할. Claude Code/Cursor 호환.' }
];

function renderCards(filter = 'all') {
  const grid = document.getElementById('repoGrid');
  grid.innerHTML = '';
  let filtered;
  if (filter === 'selected') filtered = repos.filter(r => r.selected);
  else if (filter === 'all') filtered = [...repos].sort((a, b) => (b.selected ? 1 : 0) - (a.selected ? 1 : 0));
  else filtered = repos.filter(r => r.category === filter);

  filtered.forEach(repo => {
    const card = document.createElement(repo.selected ? 'a' : 'div');
    card.className = 'card' + (repo.selected ? ' selected' : '');
    if (repo.selected) card.href = repo.detail;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name-wrap">
          <div class="card-name"><span>${repo.owner}/</span>${repo.name}</div>
          ${repo.selected ? '<span class="selected-badge">SELECTED</span>' : ''}
        </div>
        <div class="card-stars">${repo.stars}</div>
      </div>
      <div class="card-desc">${repo.desc}</div>
      <div class="card-meta">
        <div class="card-lang"><span class="lang-dot" style="background:${repo.langColor}"></span>${repo.lang}</div>
        <span class="card-category cat-${repo.category}">${repo.categoryLabel}</span>
      </div>
      <div class="card-detail-hint">${repo.selected ? 'Click for deep dive' : ''}</div>`;
    grid.appendChild(card);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter);
  });
});

renderCards();
</script>
</body>
</html>
